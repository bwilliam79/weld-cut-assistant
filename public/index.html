<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#DC2626">
  <meta name="description" content="Professional welding and plasma cutter settings calculator">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weld-Cut Assistant">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Weld-Cut Assistant</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <div class="container">

    <header>
      <h1>WELD-CUT ASSISTANT</h1>
      <p class="subtitle">PROFESSIONAL SETTINGS CALCULATOR</p>
    </header>

    <!-- Tool Selector -->
    <div class="tool-selector" role="tablist" aria-label="Select tool">

      <button class="tool-btn active" data-tool="welder" role="tab" aria-selected="true" aria-controls="welder-section">
        <!-- Welding helmet icon -->
        <svg class="tool-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 9 L4 17 Q4 19 6 19 L18 19 Q20 19 20 17 L20 9 L17 5 L7 5 Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="miter"/>
          <rect x="7" y="11" width="10" height="5" fill="currentColor"/>
        </svg>
        WELDER
      </button>

      <button class="tool-btn" data-tool="plasma" role="tab" aria-selected="false" aria-controls="plasma-section">
        <!-- Lightning bolt / plasma icon -->
        <svg class="tool-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
        </svg>
        PLASMA CUTTER
      </button>

    </div>

    <!-- ============ WELDER SECTION ============ -->
    <div id="welder-section" class="tool-section active" role="tabpanel">

      <div class="section-label" aria-hidden="true">
        <span class="section-label-line"></span>
        <span class="section-label-text">MACHINE CONFIG</span>
        <span class="section-label-line"></span>
      </div>

      <div class="form-group">
        <label for="welder-material">MATERIAL TYPE</label>
        <select id="welder-material" class="select-input">
          <option value="">Select material...</option>
          <option value="mildSteel">Mild Steel</option>
          <option value="stainlessSteelFluxCore">Stainless Steel</option>
          <option value="aluminumFluxCore">Aluminum</option>
        </select>
      </div>

      <div class="form-group">
        <label for="welder-thickness">MATERIAL THICKNESS</label>
        <select id="welder-thickness" class="select-input" disabled>
          <option value="">Select thickness...</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>INPUT VOLTAGE</label>
          <div class="voltage-toggle" role="group" aria-label="Voltage selection">
            <button class="voltage-btn active" data-voltage="220V">220V</button>
            <button class="voltage-btn" data-voltage="110V">110V</button>
          </div>
        </div>

        <div class="form-group">
          <label for="welder-wire-size">WIRE SIZE</label>
          <select id="welder-wire-size" class="select-input">
            <option value=".030">0.030"</option>
            <option value=".035">0.035"</option>
            <option value=".045">0.045"</option>
          </select>
        </div>
      </div>

      <div class="section-label" aria-hidden="true">
        <span class="section-label-line"></span>
        <span class="section-label-text">SETTINGS OUTPUT</span>
        <span class="section-label-line"></span>
      </div>

      <div id="welder-results" class="results hidden">
        <div class="result-box">
          <div class="result-row">
            <span class="result-label">WIRE SIZE</span>
            <span class="result-value" id="welder-wireSize">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">VOLTAGE</span>
            <span class="result-value" id="welder-voltage">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">AMPERAGE</span>
            <span class="result-value" id="welder-amperage">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">WIRE FEED SPEED</span>
            <span class="result-value" id="welder-wireSpeed">—</span>
          </div>
          <div id="welder-note" class="result-note"></div>
        </div>
        <button class="btn-secondary" id="welder-save">SAVE AS DEFAULT</button>
      </div>

    </div>

    <!-- ============ PLASMA CUTTER SECTION ============ -->
    <div id="plasma-section" class="tool-section" role="tabpanel">

      <div class="section-label" aria-hidden="true">
        <span class="section-label-line"></span>
        <span class="section-label-text">MACHINE CONFIG</span>
        <span class="section-label-line"></span>
      </div>

      <div class="form-group">
        <label for="plasma-material">MATERIAL TYPE</label>
        <select id="plasma-material" class="select-input">
          <option value="">Select material...</option>
          <option value="mildSteel">Mild Steel</option>
          <option value="carbonSteel">Carbon Steel</option>
          <option value="stainlessSteel">Stainless Steel</option>
          <option value="aluminum">Aluminum</option>
        </select>
      </div>

      <div class="form-group">
        <label for="plasma-thickness">MATERIAL THICKNESS</label>
        <select id="plasma-thickness" class="select-input" disabled>
          <option value="">Select thickness...</option>
        </select>
      </div>

      <div class="form-group">
        <label>INPUT VOLTAGE</label>
        <div class="voltage-toggle" role="group" aria-label="Voltage selection">
          <button class="voltage-btn active" data-voltage="220V">220V</button>
          <button class="voltage-btn" data-voltage="110V">110V</button>
        </div>
      </div>

      <div class="section-label" aria-hidden="true">
        <span class="section-label-line"></span>
        <span class="section-label-text">SETTINGS OUTPUT</span>
        <span class="section-label-line"></span>
      </div>

      <div id="plasma-results" class="results hidden">
        <div class="result-box">
          <div class="result-row">
            <span class="result-label">AMPERAGE</span>
            <span class="result-value" id="plasma-amps">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">AIR PRESSURE</span>
            <span class="result-value" id="plasma-airPressure">—</span>
          </div>
          <div class="result-row">
            <span class="result-label">CUT SPEED</span>
            <span class="result-value" id="plasma-cutSpeed">—</span>
          </div>
          <div id="plasma-note" class="result-note"></div>
        </div>
        <button class="btn-secondary" id="plasma-save">SAVE AS DEFAULT</button>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.log('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
