<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weld-Cut Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Weld-Cut Assistant</h1>
      <p class="subtitle">Professional Settings Calculator</p>
    </header>

    <!-- Tool Selector -->
    <div class="tool-selector">
      <button class="tool-btn active" data-tool="welder">Welder</button>
      <button class="tool-btn" data-tool="plasma">Plasma Cutter</button>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="quick">Quick Mode</button>
      <button class="mode-btn" data-mode="advanced">Advanced Mode</button>
    </div>

    <!-- ============ WELDER SECTION ============ -->
    <div id="welder-section" class="tool-section active">
      <!-- QUICK MODE -->
      <div id="welder-quick" class="mode-content active">
        <div class="form-group">
          <label>Material Type</label>
          <select id="welder-quick-material" class="select-input">
            <option value="">Select material...</option>
            <option value="mildSteel">Mild Steel</option>
            <option value="stainlessSteelFluxCore">Stainless Steel</option>
            <option value="aluminumFluxCore">Aluminum</option>
          </select>
        </div>

        <div class="form-group">
          <label>Thickness</label>
          <select id="welder-quick-thickness" class="select-input" disabled>
            <option value="">Select thickness...</option>
          </select>
        </div>

        <button class="btn-primary" id="welder-quick-calculate">Get Settings</button>

        <div id="welder-quick-results" class="results hidden">
          <div class="result-box">
            <div class="result-row">
              <span class="result-label">Voltage:</span>
              <span class="result-value" id="quick-voltage">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Amperage:</span>
              <span class="result-value" id="quick-amperage">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Wire Feed Speed:</span>
              <span class="result-value" id="quick-wireSpeed">-</span>
            </div>
            <div id="quick-note" class="result-note"></div>
          </div>
          <button class="btn-secondary" id="welder-quick-save">Save as Default</button>
        </div>
      </div>

      <!-- ADVANCED MODE -->
      <div id="welder-advanced" class="mode-content">
        <div class="form-row">
          <div class="form-group">
            <label>Voltage</label>
            <div class="voltage-toggle">
              <button class="voltage-btn active" data-voltage="220V">220V</button>
              <button class="voltage-btn" data-voltage="110V">110V</button>
            </div>
          </div>

          <div class="form-group">
            <label>Wire Size</label>
            <select id="welder-wire-size" class="select-input">
              <option value=".030\"">.030"</option>
              <option value=".035\"">.035"</option>
              <option value=".045\"">.045"</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Material Type</label>
          <select id="welder-adv-material" class="select-input">
            <option value="">Select material...</option>
            <option value="mildSteel">Mild Steel</option>
            <option value="stainlessSteelFluxCore">Stainless Steel</option>
            <option value="aluminumFluxCore">Aluminum</option>
          </select>
        </div>

        <div class="form-group">
          <label>Thickness</label>
          <select id="welder-adv-thickness" class="select-input" disabled>
            <option value="">Select thickness...</option>
          </select>
        </div>

        <button class="btn-primary" id="welder-adv-calculate">Get Settings</button>

        <div id="welder-adv-results" class="results hidden">
          <div class="result-box">
            <div class="result-row">
              <span class="result-label">Voltage:</span>
              <span class="result-value" id="adv-voltage">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Amperage:</span>
              <span class="result-value" id="adv-amperage">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Wire Feed Speed:</span>
              <span class="result-value" id="adv-wireSpeed">-</span>
            </div>
            <div id="adv-note" class="result-note"></div>
          </div>
          <button class="btn-secondary" id="welder-adv-save">Save as Default</button>
        </div>
      </div>
    </div>

    <!-- ============ PLASMA CUTTER SECTION ============ -->
    <div id="plasma-section" class="tool-section">
      <!-- QUICK MODE -->
      <div id="plasma-quick" class="mode-content active">
        <div class="form-group">
          <label>Material Type</label>
          <select id="plasma-quick-material" class="select-input">
            <option value="">Select material...</option>
            <option value="mildSteel">Mild Steel</option>
            <option value="carbonSteel">Carbon Steel</option>
            <option value="stainlessSteel">Stainless Steel</option>
            <option value="aluminum">Aluminum</option>
          </select>
        </div>

        <div class="form-group">
          <label>Thickness</label>
          <select id="plasma-quick-thickness" class="select-input" disabled>
            <option value="">Select thickness...</option>
          </select>
        </div>

        <button class="btn-primary" id="plasma-quick-calculate">Get Settings</button>

        <div id="plasma-quick-results" class="results hidden">
          <div class="result-box">
            <div class="result-row">
              <span class="result-label">Amperage:</span>
              <span class="result-value" id="plasma-quick-amps">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Air Pressure:</span>
              <span class="result-value" id="plasma-quick-airPressure">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Cut Speed:</span>
              <span class="result-value" id="plasma-quick-cutSpeed">-</span>
            </div>
            <div id="plasma-quick-note" class="result-note"></div>
          </div>
          <button class="btn-secondary" id="plasma-quick-save">Save as Default</button>
        </div>
      </div>

      <!-- ADVANCED MODE -->
      <div id="plasma-advanced" class="mode-content">
        <div class="form-row">
          <div class="form-group">
            <label>Voltage</label>
            <div class="voltage-toggle">
              <button class="voltage-btn active" data-voltage="220V">220V</button>
              <button class="voltage-btn" data-voltage="110V">110V</button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Material Type</label>
          <select id="plasma-adv-material" class="select-input">
            <option value="">Select material...</option>
            <option value="mildSteel">Mild Steel</option>
            <option value="carbonSteel">Carbon Steel</option>
            <option value="stainlessSteel">Stainless Steel</option>
            <option value="aluminum">Aluminum</option>
          </select>
        </div>

        <div class="form-group">
          <label>Thickness</label>
          <select id="plasma-adv-thickness" class="select-input" disabled>
            <option value="">Select thickness...</option>
          </select>
        </div>

        <button class="btn-primary" id="plasma-adv-calculate">Get Settings</button>

        <div id="plasma-adv-results" class="results hidden">
          <div class="result-box">
            <div class="result-row">
              <span class="result-label">Amperage:</span>
              <span class="result-value" id="plasma-adv-amps">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Air Pressure:</span>
              <span class="result-value" id="plasma-adv-airPressure">-</span>
            </div>
            <div class="result-row">
              <span class="result-label">Cut Speed:</span>
              <span class="result-value" id="plasma-adv-cutSpeed">-</span>
            </div>
            <div id="plasma-adv-note" class="result-note"></div>
          </div>
          <button class="btn-secondary" id="plasma-adv-save">Save as Default</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
