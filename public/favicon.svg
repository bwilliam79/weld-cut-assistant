<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a"/>

  <!-- Welder Torch Handle -->
  <rect x="70" y="100" width="60" height="70" rx="10" fill="#1a1a1a" stroke="#dc143c" stroke-width="2"/>

  <!-- Torch Nozzle -->
  <g>
    <!-- Main nozzle body -->
    <rect x="75" y="50" width="50" height="50" rx="5" fill="#333" stroke="#dc143c" stroke-width="2"/>

    <!-- Nozzle tip -->
    <polygon points="100,35 90,50 110,50" fill="#dc143c"/>
    <circle cx="100" cy="45" r="8" fill="#dc143c" opacity="0.8"/>
  </g>

  <!-- Trigger -->
  <path d="M 130 120 Q 140 125 135 140" stroke="#dc143c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Welding Arc/Spark effect -->
  <g opacity="0.7">
    <circle cx="100" cy="30" r="3" fill="#ff6600"/>
    <circle cx="105" cy="28" r="2" fill="#ffaa00"/>
    <circle cx="95" cy="32" r="2" fill="#ffaa00"/>
  </g>

  <!-- Bottom accent lines for grip -->
  <line x1="80" y1="130" x2="120" y2="130" stroke="#dc143c" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="145" x2="120" y2="145" stroke="#dc143c" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="160" x2="120" y2="160" stroke="#dc143c" stroke-width="1" opacity="0.5"/>
</svg>
