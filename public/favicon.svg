<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Torch Nozzle/Tip -->
  <path d="M 100 30 L 110 50 L 90 50 Z" fill="#dc143c"/>
  <rect x="85" y="50" width="30" height="35" rx="3" fill="#dc143c"/>

  <!-- Nozzle opening -->
  <circle cx="100" cy="52" r="6" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Torch Body/Handle -->
  <rect x="75" y="85" width="50" height="65" rx="8" fill="#dc143c"/>

  <!-- Handle grip lines -->
  <line x1="80" y1="100" x2="120" y2="100" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="115" x2="120" y2="115" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="130" x2="120" y2="130" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Trigger -->
  <path d="M 125 105 Q 135 110 130 125" stroke="#dc143c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Welding spark/arc indicator -->
  <circle cx="100" cy="40" r="2.5" fill="#ff6600" opacity="0.8"/>
  <circle cx="105" cy="38" r="1.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="95" cy="42" r="1.5" fill="#ffaa00" opacity="0.6"/>
</svg>
