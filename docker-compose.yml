version: '3.8'

services:
  weld-cut-assistant:
    build: .
    container_name: weld-cut-assistant
    ports:
      - "3000:3000"
    volumes:
      - weld-cut-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000

volumes:
  weld-cut-data:
    driver: local
